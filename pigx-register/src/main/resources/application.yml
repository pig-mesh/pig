server:
  port: 18848
  tomcat:
    basedir: logs
  error:
    include-message: always
db:
  num: 1
  user: SYSDBA
  password: SYSDBA
  url:
    0: jdbc:dm://home:35236
  pool:
    config:
      driver-class-name: dm.jdbc.driver.DmDriver

nacos:
  core:
    auth:
      server:
        identity:
          key: serverIdentity
          value: security
      system.type: nacos
      plugin.nacos.token.secret.key: SecretKey012345678901234567890123456789012345678901234567890123456789
  security:
    ignore:
      urls: /actuator/**,/,/error,/**/*.css,/**/*.js,/**/*.html,/**/*.map,/**/*.svg,/**/*.png,/**/*.ico,/console-fe/public/**,/v1/auth/**,/v1/console/health/**,/actuator/**,/v1/console/server/**

spring:
  datasource:
    platform: dameng  #这个过期属性不能修改，nacos 代码对此有硬编码
  security:
    enabled: true
  boot: # 接入 spring boot admin
    admin:
      client:
        url: http://pigx-monitor:5001
        username: pig
        password: pig
        instance:
          service-host-type: ip
  application:
    name: @project.artifactId@

useAddressServer: true

management:
  endpoints:
    web:
      exposure:
        include: '*'
  metrics:
    export:
      influx:
        enabled: false
      elastic:
        enabled: false
