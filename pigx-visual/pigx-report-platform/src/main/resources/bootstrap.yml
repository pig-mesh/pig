server:
  port: 9095

spring:
  application:
    name: @artifactId@
  cloud:
    nacos:
      config:
        server-addr: ${NACOS_HOST:pigx-register}:${NACOS_PORT:8848}
        file-extension: yml
        shared-configs:
          - application-${spring.profiles.active}.${spring.cloud.nacos.config.file-extension}
        namespace: @db.type@
  profiles:
    active: @profiles.active@
