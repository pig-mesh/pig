# Nacos 控制台端口，请注意访问的 IP:8080
nacos.console.port=8080
# Nacos 服务端主端口
nacos.server.main.port=8848
# 数据库设置
spring.sql.init.platform=mysql
db.num=1
db.url.0=jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DB:pig_config}?characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=GMT%2B8&nullCatalogMeansCurrent=true&allowPublicKeyRetrieval=true
db.user=root
db.password=root
# nacos 会自动装配数据源，所以排除 spring.datasource 自动配置
spring.autoconfigure.exclude=org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration
#*************** 监控相关配置 ***************#
# Prometheus 监控配置
#management.endpoints.web.exposure.include=prometheus
# ElasticSearch 监控配置 - 已禁用
management.elastic.metrics.export.enabled=false
# InfluxDB 监控配置 - 已禁用
management.influx.metrics.export.enabled=false
#*************** 配置中心相关 ***************#
# Nacos 配置推送最大重试次数
nacos.config.push.maxRetryTime=50
#*************** 命名服务相关 ***************#
# 空服务自动清理
nacos.naming.empty-service.auto-clean=true
nacos.naming.empty-service.clean.initial-delay-ms=50000
nacos.naming.empty-service.clean.period-time-ms=30000
#*************** Nacos Web 相关配置 ***************#
# Nacos 服务端上下文路径
nacos.server.contextPath=/nacos
#*************** 日志相关配置 ***************#
# 开启访问日志
server.tomcat.accesslog.enabled=true
# 访问日志保留天数配置
server.tomcat.accesslog.max-days=30
# 访问日志格式
server.tomcat.accesslog.pattern=%h %l %u %t "%r" %s %b %D %{User-Agent}i %{Request-Source}i
# 日志基础目录
server.tomcat.basedir=file:.
#*************** API 错误处理 ***************#
# 错误信息显示设置
spring.web.error.include-message=ALWAYS
#*************** Nacos 控制台配置 ***************#
# Nacos 控制台上下文路径
nacos.console.contextPath=
# Nacos 控制台远程服务上下文路径
nacos.console.remote.server.context-path=/nacos
#*************** 安全相关配置 ***************#
# 安全忽略 URL
nacos.security.ignore.urls=/,/error,/**/*.css,/**/*.js,/**/*.html,/**/*.map,/**/*.svg,/**/*.png,/**/*.ico,/console-ui/public/**,/v1/auth/**,/v1/console/health/**,/actuator/**,/v1/console/server/**
# 认证系统类型
nacos.core.auth.system.type=nacos
# 开启认证
nacos.core.auth.enabled=true
# 启用 API 访问权限
nacos.core.auth.admin.enabled=true
# 启用控制台 API 认证
nacos.core.auth.console.enabled=true
# 开启认证缓存
nacos.core.auth.caching.enabled=true
# 服务器身份认证 (当 nacos.core.auth.enabled=true 时生效)
nacos.core.auth.server.identity.key=VGhpc0lzTXlDdXN0b21TZWNyZXRLZXkwMTIzNDU2Nzg=
nacos.core.auth.server.identity.value=VGhpc0lzTXlDdXN0b21TZWNyZXRLZXkwMTIzNDU2Nzg=
# Nacos 令牌相关配置
nacos.core.auth.plugin.nacos.token.cache.enable=false
nacos.core.auth.plugin.nacos.token.expire.seconds=18000
# 认证密钥 (Base64 编码)
nacos.core.auth.plugin.nacos.token.secret.key=VGhpc0lzTXlDdXN0b21TZWNyZXRLZXkwMTIzNDU2Nzg=
#*************** Istio 服务网格配置 ***************#
# MCP 服务支持 - 已禁用
nacos.istio.mcp.server.enabled=false
#*************** K8s 相关配置 ***************#
# K8s 同步支持 - 已禁用
nacos.k8s.sync.enabled=false
#*************** 部署模式配置 ***************#
# 部署模式: 'merged' 混合模式, 'server' 服务端模式, 'console' 控制台模式
nacos.deployment.type=merged
#*************** 模糊匹配配置 ***************#
# 配置中心模糊匹配最大值
nacos.config.fuzzy.watch.max.pattern.count=20
nacos.config.fuzzy.watch.max.pattern.match.config.count=500
# 服务发现模糊匹配最大值
nacos.naming.fuzzy.watch.max.pattern.count=20
nacos.naming.fuzzy.watch.max.pattern.match.service.count=500
#*************** AI 与广告扩展配置 ***************#
# Nacos AI 扩展功能开关 - 已禁用
nacos.extension.ai.enabled=false
# Nacos 控制台广告展示开关 - 已禁用
nacos.console.ad.enabled=false
